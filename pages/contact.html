<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Link-in-Bio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[var(--bg-page)] text-[var(--text-main)] min-h-screen">
    <nav class="p-6 max-w-7xl mx-auto flex justify-between items-center">
        <a href="../index.html" class="flex items-center gap-2">
            <div class="bg-[var(--bg-card)] p-2 rounded-xl border border-[var(--border-subtle)]">
                <i data-lucide="zap" class="w-6 h-6 text-[var(--text-on-light)]"></i>
            </div>
            <span class="font-bold text-2xl tracking-tighter text-[var(--text-main)]">Link-in-Bio</span>
        </a>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-20 text-center">
        <h1 class="text-4xl font-black mb-4 text-[var(--text-main)]">Get in Touch</h1>
        <p class="text-[var(--text-muted)] mb-12">Have questions or need support? We're here to help.</p>
        
        <div class="bg-[var(--bg-card)] p-8 rounded-3xl border border-[var(--border-subtle)] text-left text-[var(--text-on-light)]">
            <form class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-[var(--text-on-light)]/60 mb-1 ml-1">Your Name</label>
                    <input type="text" class="w-full bg-[var(--bg-page)]/5 border border-[var(--border-subtle)] rounded-2xl py-3.5 px-5 outline-none focus:ring-1 focus:ring-[var(--c-primary)] text-[var(--text-on-light)]">
                </div>
                <div>
                    <label class="block text-sm font-medium text-[var(--text-on-light)]/60 mb-1 ml-1">Email Address</label>
                    <input type="email" class="w-full bg-[var(--bg-page)]/5 border border-[var(--border-subtle)] rounded-2xl py-3.5 px-5 outline-none focus:ring-1 focus:ring-[var(--c-primary)] text-[var(--text-on-light)]">
                </div>
                <div>
                    <label class="block text-sm font-medium text-[var(--text-on-light)]/60 mb-1 ml-1">Message</label>
                    <textarea rows="4" class="w-full bg-[var(--bg-page)]/5 border border-[var(--border-subtle)] rounded-2xl py-3.5 px-5 outline-none focus:ring-1 focus:ring-[var(--c-primary)] text-[var(--text-on-light)]"></textarea>
                </div>
                <button type="submit" class="w-full creative-btn-primary py-4 rounded-2xl font-bold">Send Message</button>
            </form>
        </div>
        
        <div class="mt-12 flex justify-center gap-8">
            <div class="text-center">
                <i data-lucide="mail" class="w-6 h-6 text-[var(--text-dim)] mx-auto mb-2"></i>
                <p class="text-sm text-[var(--text-muted)] font-medium">support@linkinbio.com</p>
            </div>
            <div class="text-center">
                <i data-lucide="twitter" class="w-6 h-6 text-[var(--text-dim)] mx-auto mb-2"></i>
                <p class="text-sm text-[var(--text-muted)] font-medium">@linkinbiodev</p>
            </div>
        </div>
    <footer></footer>
    <script type="module" src="../assets/js/layout.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
