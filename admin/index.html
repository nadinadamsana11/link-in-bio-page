<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Link-in-Bio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen overflow-x-hidden">
    <nav class="glass-dark border-b border-slate-900/50 p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-slate-800 p-2 rounded-lg border border-slate-700">
                    <i data-lucide="shield-check" class="w-5 h-5 text-white"></i>
                </div>
                <span class="font-bold text-xl tracking-tight">Admin Console</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="../dashboard/index.html" class="text-slate-400 hover:text-white text-sm font-medium">Dashboard</a>
                <button onclick="logout()" class="text-slate-400 hover:text-red-400 p-2 rounded-lg hover:bg-red-400/10">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 md:p-8 space-y-8">
        <header>
            <h1 class="text-3xl font-bold">User Management</h1>
            <p class="text-slate-400 mt-2">Oversee all registered users and their profiles.</p>
        </header>

        <section class="glass-dark rounded-2xl border border-slate-800 overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-800/50 border-b border-slate-700">
                        <tr>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-300">User</th>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-300">Email</th>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-300">Username</th>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-300">Joined</th>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-300 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody" class="divide-y divide-slate-800">
                        <!-- Users will be injected here -->
                        <tr>
                            <td colspan="5" class="px-6 py-12 text-center text-slate-500 italic">
                                Loading users...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module" src="../assets/js/admin.js"></script>
    <script type="module" src="../assets/js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
