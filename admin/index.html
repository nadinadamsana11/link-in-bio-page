<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Link-in-Bio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[var(--bg-page)] text-[var(--text-main)] min-h-screen overflow-x-hidden">
    <nav class="bg-[var(--bg-card)] border-b border-[var(--border-subtle)] p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-[var(--bg-card)] p-2 rounded-lg border border-[var(--border-subtle)]">
                    <i data-lucide="shield-check" class="w-5 h-5 text-[var(--text-on-light)]"></i>
                </div>
                <span class="font-bold text-xl tracking-tight text-[var(--text-on-light)]">Admin Console</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="../dashboard/index.html" class="text-[var(--text-on-light)]/70 hover:text-[var(--text-on-light)] text-sm font-medium">Dashboard</a>
                <button onclick="logout()" class="text-[var(--text-on-light)]/70 hover:text-red-600 p-2 rounded-lg hover:bg-red-600/10">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 md:p-8 space-y-8">
        <header>
            <h1 class="text-3xl font-bold text-[var(--text-main)]">User Management</h1>
            <p class="text-[var(--text-muted)] mt-2">Oversee all registered users and their profiles.</p>
        </header>

        <section class="bg-[var(--bg-card)] rounded-2xl border border-[var(--border-subtle)] overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-[var(--bg-card-hover)]/10 border-b border-[var(--border-subtle)]">
                        <tr>
                            <th class="px-6 py-4 text-sm font-semibold text-[var(--text-on-light)]">User</th>
                            <th class="px-6 py-4 text-sm font-semibold text-[var(--text-on-light)]">Email</th>
                            <th class="px-6 py-4 text-sm font-semibold text-[var(--text-on-light)]">Username</th>
                            <th class="px-6 py-4 text-sm font-semibold text-[var(--text-on-light)]">Joined</th>
                            <th class="px-6 py-4 text-sm font-semibold text-[var(--text-on-light)] text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody" class="divide-y divide-[var(--border-subtle)]">
                        <!-- Users will be injected here -->
                        <tr>
                            <td colspan="5" class="px-6 py-12 text-center text-[var(--text-muted)] italic">
                                Loading users...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer></footer>
    <script type="module" src="../assets/js/layout.js"></script>
    <script type="module" src="../assets/js/admin.js"></script>
    <script type="module" src="../assets/js/auth.js"></script>
</body>
</html>
