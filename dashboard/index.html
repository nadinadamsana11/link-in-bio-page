<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Digital Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(2rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-[var(--bg-page)] text-[var(--text-main)] min-h-screen flex flex-col">
    <div class="bg-dot-matrix"></div>
    <!-- Nav -->
    <nav class="border-b border-[var(--border-subtle)] bg-[var(--bg-card)] sticky top-0 z-[100] shadow-sm">
        <div class="max-w-[1200px] mx-auto px-6 h-16 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-[var(--bg-page)]/10 p-1.5 rounded-lg border border-[var(--border-subtle)]">
                    <i data-lucide="zap" class="w-4 h-4 text-[var(--c-primary)]"></i>
                </div>
                <a href="../index.html" class="font-black text-lg tracking-tighter italic text-[var(--c-primary)]">Digital Profile</a>
            </div>
            
            <!-- Global Search Placeholder (Facebook style) -->
            <div class="hidden lg:flex flex-1 max-w-md mx-10">
                <div class="w-full bg-[var(--bg-page)]/5 border border-[var(--border-subtle)] rounded-full px-4 py-2 flex items-center gap-3">
                    <i data-lucide="search" class="w-4 h-4 text-[var(--text-muted)]"></i>
                    <span class="text-xs text-[var(--text-muted)] font-medium">Search Identity...</span>
                </div>
            </div>

            <!-- Profile Dropdown -->
            <div class="relative">
                <button id="profileDropdownBtn" class="flex items-center gap-2 p-1 rounded-full hover:bg-[var(--bg-page)]/5 transition-all">
                    <div id="navAvatar" class="w-9 h-9 rounded-full bg-[var(--bg-page)]/10 border border-[var(--border-subtle)] overflow-hidden flex items-center justify-center">
                        <div class="skeleton w-full h-full"></div>
                    </div>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-[var(--text-muted)] mr-1"></i>
                </button>

                <!-- Dropdown Menu -->
                <div id="profileDropdown" class="hidden absolute right-0 mt-2 w-72 bg-[var(--bg-card)] border border-[var(--border-subtle)] rounded-2xl shadow-2xl z-[110] overflow-hidden animate-slide-up">
                    <div class="p-4 border-b border-[var(--border-subtle)] bg-[var(--bg-page)]/5">
                        <p id="dropdownEmail" class="text-xs font-black text-[var(--text-on-light)] truncate">loading...</p>
                    </div>
                    <div class="p-2">
                        <a id="publicProfileBtn" href="#" target="_blank" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-[var(--bg-page)]/5 text-[var(--text-on-light)] transition-all">
                            <i data-lucide="external-link" class="w-4 h-4"></i>
                            <span class="text-[10px] font-black uppercase tracking-widest">View Presence</span>
                        </a>
                        <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-red-500/5 text-red-500 transition-all text-left">
                            <i data-lucide="log-out" class="w-4 h-4"></i>
                            <span class="text-[10px] font-black uppercase tracking-widest">Sign Out</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Cover Photo Section -->
    <div class="cover-photo-container">
        <div id="coverPhoto" class="w-full h-full skeleton"></div>
        <input type="file" id="coverPhotoInput" class="hidden" accept="image/*">
        <button id="editCoverBtn" class="absolute bottom-4 right-4 bg-white/90 hover:bg-white text-black px-4 py-2 rounded-lg font-bold text-xs flex items-center gap-2 shadow-lg transition-all">
            <i data-lucide="camera" class="w-4 h-4"></i>
            Edit cover photo
        </button>
    </div>

    <!-- Profile Header -->
    <div class="bg-[var(--bg-card)] border-b border-[var(--border-subtle)] shadow-sm">
        <div class="profile-header-wrapper">
            <div class="flex flex-col md:flex-row items-center md:items-end gap-6 pb-6">
                <!-- Avatar -->
                <div class="relative group">
                    <div id="avatarPreview" class="profile-avatar-large shadow-xl flex items-center justify-center">
                        <div class="skeleton w-full h-full"></div>
                    </div>
                    <button class="absolute bottom-2 right-2 bg-[var(--bg-page)] p-2 rounded-full border border-[var(--border-subtle)] shadow-lg hover:scale-110 transition-all">
                        <i data-lucide="camera" class="w-5 h-5 text-[var(--text-main)]"></i>
                    </button>
                </div>

                <!-- Info -->
                <div class="flex-1 text-center md:text-left mb-2">
                    <h1 id="badgeName" class="text-4xl font-black tracking-tight text-[var(--text-on-light)] mb-1">
                        <div class="skeleton w-48 h-10 mx-auto md:mx-0"></div>
                    </h1>
                    <div class="flex flex-wrap justify-center md:justify-start gap-4 text-sm font-bold text-[var(--text-muted)]">
                        <span id="followerCount"><div class="skeleton w-24 h-4"></div></span>
                        <span id="badgeUsername"><div class="skeleton w-20 h-4"></div></span>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex gap-2 mb-4">
                    <button id="dashboardTabBtn" class="bg-[var(--c-primary)] text-[var(--c-bg)] px-6 py-2.5 rounded-lg font-black text-xs uppercase tracking-widest flex items-center gap-2 shadow-lg hover:brightness-110 transition-all">
                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                        Dashboard
                    </button>
                    <button id="editIdentityBtn" class="bg-[var(--bg-page)]/10 text-[var(--text-on-light)] px-4 py-2.5 rounded-lg font-black text-xs uppercase tracking-widest flex items-center gap-2 border border-[var(--border-subtle)] hover:bg-[var(--bg-page)]/20 transition-all">
                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                        Edit
                    </button>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex border-t border-[var(--border-subtle)] mt-2">
                <button class="tab-nav-item active">About</button>
                <button class="tab-nav-item">Links</button>
                <button class="tab-nav-item">Photos</button>
                <button class="tab-nav-item">Presence</button>
            </div>
        </div>
    </div>

    <main class="max-w-[1200px] mx-auto px-6 py-8">
        <div class="social-grid">
            <!-- Left Sidebar -->
            <aside class="social-sidebar space-y-6">
                <!-- Intro Card -->
                <div class="card-social space-y-6">
                    <h3 class="text-xl font-black tracking-tight text-[var(--text-on-light)]">Intro</h3>
                    <div id="badgeBio" class="text-sm font-medium text-center md:text-left leading-relaxed opacity-80">
                        <div class="skeleton w-full h-4 mb-2"></div>
                        <div class="skeleton w-3/4 h-4"></div>
                    </div>
                    
                    <div class="space-y-4 pt-4 border-t border-[var(--border-subtle)]">
                        <div class="flex items-center gap-3 text-[var(--text-on-light)]">
                            <i data-lucide="map-pin" class="w-5 h-5 opacity-60"></i>
                            <span id="badgeHome" class="text-sm font-bold"><div class="skeleton w-32 h-4"></div></span>
                        </div>
                        <div class="flex items-center gap-3 text-[var(--text-on-light)]">
                            <i data-lucide="cake" class="w-5 h-5 opacity-60"></i>
                            <span id="badgeDOB" class="text-sm font-bold"><div class="skeleton w-24 h-4"></div></span>
                        </div>
                        <div class="flex items-center gap-3 text-[var(--text-on-light)]">
                            <i data-lucide="clock" class="w-5 h-5 opacity-60"></i>
                            <span id="badgeAge" class="text-sm font-bold"><div class="skeleton w-16 h-4"></div></span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Main Content Area -->
            <div class="space-y-6 mt-6 lg:mt-0">
                <!-- Links Library -->
                <div class="card-social space-y-8">
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="text-2xl font-black tracking-tight text-[var(--text-on-light)]">Link Library</h3>
                            <p class="text-[9px] text-[var(--text-muted)] font-black uppercase tracking-widest mt-1"><span id="linkCount">0</span> Destination Entries</p>
                        </div>
                        <button id="addLinkBtn" class="bg-[var(--c-primary)] text-white px-6 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2 hover:brightness-110 transition-all shadow-lg">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            Add Entry
                        </button>
                    </div>

                    <div id="linksList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Skeleton Links -->
                        <div class="skeleton h-24 rounded-2xl"></div>
                        <div class="skeleton h-24 rounded-2xl"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 3-STEP IDENTITY WIZARD MODAL -->
    <div id="identityModal" class="hidden fixed inset-0 bg-[var(--bg-page)]/95 backdrop-blur-3xl z-[100] flex items-center justify-center p-6">
        <div class="bg-[var(--bg-card)] border border-[var(--border-subtle)] w-full max-w-2xl rounded-[3rem] p-10 md:p-14 relative shadow-2xl overflow-hidden text-[var(--text-on-light)]">
            <button id="closeIdentityModal" class="absolute top-10 right-10 text-[var(--text-muted)] hover:text-[var(--text-main)] bg-[var(--bg-card-hover)] w-12 h-12 rounded-full flex items-center justify-center transition-all z-[110]">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            
            <!-- Progress Bar -->
            <div class="flex gap-2 mb-12">
                <div class="progress-bar-step active" id="step1-indicator"></div>
                <div class="progress-bar-step" id="step2-indicator"></div>
                <div class="progress-bar-step" id="step3-indicator"></div>
            </div>

            <h3 class="text-4xl font-black tracking-tighter mb-10" id="wizardTitle">Persona Setup</h3>
            
            <!-- STEP 1: Persona -->
            <div class="wizard-step active" id="step1">
                <div class="space-y-10">
                    <div class="flex flex-col items-center gap-5 py-8 bg-[var(--bg-page)]/50 rounded-[2.5rem] border border-[var(--border-subtle)] group">
                        <div id="modalAvatarPreview" class="w-32 h-32 rounded-[2.5rem] bg-[var(--bg-card-hover)] border-4 border-[var(--border-subtle)] overflow-hidden shadow-2xl group-hover:scale-105 transition-transform"></div>
                        <label class="cursor-pointer bg-[var(--bg-card-hover)] px-8 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest text-[var(--text-muted)] hover:bg-[var(--c-primary)] hover:text-[var(--c-bg)] transition-all">
                            Change Portrait
                            <input type="file" id="photoInput" class="hidden" accept="image/*">
                        </label>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-[10px] font-black text-[var(--text-muted)] uppercase tracking-[0.2em] mb-3 ml-1">Identity Name</label>
                            <input type="text" id="displayName"
                                class="w-full bg-[var(--bg-page)]/5 border border-[var(--border-subtle)] rounded-2xl py-5 px-6 focus:ring-1 focus:ring-[var(--c-primary)] outline-none transition-all font-bold text-[var(--text-on-light)]"
                                placeholder="Your Name">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-[var(--text-muted)] uppercase tracking-[0.2em] mb-3 ml-1">Unique Handle</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-6 flex items-center text-[var(--text-dim)] font-black">@</span>
                                <input type="text" id="dashboardUsername"
                                    class="w-full bg-[var(--bg-page)]/5 border border-[var(--border-subtle)] rounded-2xl py-5 pl-12 pr-6 focus:ring-1 focus:ring-[var(--c-primary)] outline-none transition-all font-mono font-bold text-[var(--text-on-light)]"
                                    placeholder="handle">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- STEP 2: Professional -->
            <div class="wizard-step" id="step2">
                <div class="space-y-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-[10px] font-black text-[var(--text-muted)] uppercase tracking-[0.2em] mb-3 ml-1">Date of Birth</label>
                            <input type="date" id="dob"
                                class="w-full bg-[var(--bg-page)] border border-[var(--border-subtle)] rounded-2xl py-5 px-6 focus:ring-1 focus:ring-[var(--c-primary)] outline-none transition-all font-bold text-[var(--text-muted)]">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-[var(--text-on-light)]/60 uppercase tracking-[0.2em] mb-3 ml-1">Gender</label>
                            <select id="gender" class="w-full bg-[var(--bg-page)]/5 border border-[var(--border-subtle)] rounded-2xl py-5 px-6 focus:ring-1 focus:ring-[var(--c-primary)] outline-none transition-all font-bold appearance-none text-[var(--text-on-light)]">
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Non-binary">Non-binary</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-3 ml-1 tracking-[0.2em] font-black text-[var(--text-muted)] text-[10px] uppercase">
                            <span>Production Bio</span>
                            <span id="bioCounter">0/150</span>
                        </div>
                        <textarea id="bio" maxlength="150" rows="4" 
                            class="w-full bg-[var(--bg-page)]/5 border border-[var(--border-subtle)] rounded-[2rem] py-5 px-6 focus:ring-1 focus:ring-[var(--c-primary)] outline-none transition-all text-sm leading-relaxed text-[var(--text-on-light)]"
                            placeholder="Tell the world who you are..."></textarea>
                    </div>
                </div>
            </div>

            <!-- STEP 3: Access & Contact -->
            <div class="wizard-step" id="step3">
                <div class="space-y-10">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-[10px] font-black text-[var(--text-muted)] uppercase tracking-[0.2em] mb-3 ml-1">Public Phone</label>
                            <input type="tel" id="tel"
                                class="w-full bg-[var(--bg-page)] border border-[var(--border-subtle)] rounded-2xl py-5 px-6 focus:ring-1 focus:ring-[var(--c-primary)] outline-none transition-all font-bold text-[var(--text-main)]"
                                placeholder="+00 000 000 000">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-[var(--text-muted)] uppercase tracking-[0.2em] mb-3 ml-1">City / Home</label>
                            <input type="text" id="home"
                                class="w-full bg-[var(--bg-page)] border border-[var(--border-subtle)] rounded-2xl py-5 px-6 focus:ring-1 focus:ring-[var(--c-primary)] outline-none transition-all font-bold text-[var(--text-main)]"
                                placeholder="e.g. Colombo, SL">
                        </div>
                    </div>
                    <div class="bg-[var(--bg-page)]/50 p-6 rounded-2xl border border-dashed border-[var(--border-subtle)]">
                        <p class="text-[10px] font-black text-[var(--text-muted)] uppercase tracking-widest text-center mb-2">Notice</p>
                        <p class="text-xs text-[var(--text-muted)] text-center leading-relaxed italic">By securing this identity, you confirm that all provided details are accurate for professional verification purposes.</p>
                    </div>
                </div>
            </div>

            <!-- Wizard Controls -->
            <div class="flex gap-4 mt-12 pt-10 border-t border-[var(--border-subtle)]">
                <button id="prevStepBtn" class="hidden flex-1 bg-[var(--bg-card-hover)] text-[var(--text-muted)] py-5 rounded-[2rem] font-black text-[10px] uppercase tracking-widest hover:bg-[var(--bg-card)] transition-all">
                    Back to previous
                </button>
                <button id="nextStepBtn" class="flex-1 creative-btn-primary py-5 rounded-[2rem] font-black text-[10px] uppercase tracking-widest transition-all shadow-xl">
                    Continue Setup
                </button>
                <button id="saveProfileBtn" class="hidden flex-1 creative-btn-primary py-5 rounded-[2rem] font-black text-[10px] uppercase tracking-widest transition-all shadow-xl">
                    Secure production ID
                </button>
            </div>
        </div>
    </div>

    <!-- Link Modal -->
    <div id="linkModal" class="hidden fixed inset-0 bg-[var(--bg-page)]/95 backdrop-blur-3xl z-[100] flex items-center justify-center p-6">
        <div class="bg-[var(--bg-card)] border border-[var(--border-subtle)] w-full max-w-lg rounded-[3rem] p-10 md:p-14 relative shadow-2xl text-[var(--text-on-light)]">
            <button id="closeModalBtn" class="absolute top-10 right-10 text-[var(--text-muted)] hover:text-[var(--text-main)] bg-[var(--bg-card-hover)] w-12 h-12 rounded-full flex items-center justify-center">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <h3 id="modalTitle" class="text-4xl font-black tracking-tighter mb-12">Add New Entry</h3>
            
            <form id="linkForm" class="space-y-8">
                <input type="hidden" id="linkIndex">
                <div>
                    <label class="block text-[10px] font-black text-[var(--text-muted)] uppercase tracking-[0.2em] mb-3 ml-1">Identity Label</label>
                    <input type="text" id="linkTitle" required
                        class="w-full bg-[var(--bg-page)] border border-[var(--border-subtle)] rounded-2xl py-5 px-6 focus:ring-1 focus:ring-[var(--c-primary)] outline-none transition-all font-bold text-[var(--text-main)]"
                        placeholder="e.g. Official Portfolio">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-[var(--text-muted)] uppercase tracking-[0.2em] mb-3 ml-1">Destination URL</label>
                    <input type="url" id="linkUrl" required
                        class="w-full bg-[var(--bg-page)] border border-[var(--border-subtle)] rounded-2xl py-5 px-6 focus:ring-1 focus:ring-[var(--c-primary)] outline-none transition-all font-bold text-[var(--text-main)]"
                        placeholder="https://example.com">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-[var(--text-muted)] uppercase tracking-[0.2em] mb-3 ml-1">Icon Identity</label>
                    <select id="linkIcon" class="w-full bg-[var(--bg-page)] border border-[var(--border-subtle)] rounded-2xl py-5 px-6 focus:ring-1 focus:ring-[var(--c-primary)] outline-none transition-all font-bold appearance-none text-[var(--text-main)]">
                        <option value="link">General</option>
                        <option value="globe">Web</option>
                        <option value="twitter">Twitter</option>
                        <option value="instagram">Instagram</option>
                        <option value="github">GitHub</option>
                        <option value="linkedin">LinkedIn</option>
                        <option value="youtube">YouTube</option>
                    </select>
                </div>
                <button type="submit" class="w-full creative-btn-primary py-6 rounded-3xl font-black text-sm uppercase tracking-[0.3em] transition-all hover:scale-[1.02] mt-6 shadow-2xl">
                    Secure & Save Entry
                </button>
            </form>
        </div>
    </div>

    <footer></footer>

    <script type="module" src="../assets/js/layout.js"></script>
    <script type="module" src="../assets/js/dashboard.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
