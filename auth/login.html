<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Link-in-Bio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black text-white min-h-screen flex flex-col">
    <div class="bg-dot-matrix"></div>
    <main class="flex-grow flex items-center justify-center p-6 bg-black relative overflow-hidden">
        <div id="auth-card" class="bg-[#121212] p-8 md:p-12 rounded-[2.5rem] w-full max-w-md shadow-2xl border border-white/5 relative z-10 transition-all">
        <div class="text-center mb-8">
            <div id="logo-box" class="bg-[#1a1a1a] w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-white/10">
                <i data-lucide="log-in" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tight text-white">Welcome back</h1>
            <p class="text-white/40 mt-2">Sign in to manage your page</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-white/40 mb-1 ml-1">Email Address</label>
                <input type="email" id="email" required autocomplete="email"
                    class="w-full bg-[#1a1a1a] border border-white/5 rounded-2xl py-3.5 px-5 focus:ring-1 focus:ring-[#0078d7] outline-none transition-all placeholder-white/10"
                    placeholder="name@example.com">
            </div>
            <div id="passwordArea">
                <label class="block text-sm font-medium text-white/40 mb-1 ml-1">Password</label>
                <div class="relative">
                    <input type="password" id="password" autocomplete="current-password"
                        class="w-full bg-[#1a1a1a] border border-white/5 rounded-2xl py-3.5 px-5 pr-12 focus:ring-1 focus:ring-[#0078d7] outline-none transition-all placeholder-white/10"
                        placeholder="••••••••">
                    <button type="button" class="password-toggle absolute right-4 top-1/2 -translate-y-1/2 text-white/20 hover:text-white transition-colors">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            <button type="submit" 
                class="w-full premium-btn py-4 rounded-2xl transition-all flex items-center justify-center gap-2 group mt-2">
                Sign In
                <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
            </button>
            <button type="button" id="magicLinkBtn" class="w-full text-[#0078d7] hover:text-[#0086f0] text-sm font-bold py-1 transition-all">
                Send Login Link instead
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-white/5"></span></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#121212] px-4 text-white/20 font-black tracking-widest">Or continue with</span></div>
        </div>

        <button id="googleLogin" 
            class="w-full bg-[#1a1a1a] hover:bg-black text-white font-black py-4 rounded-2xl border border-white/10 transition-all flex items-center justify-center gap-3">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
        </button>

        <p id="message" class="mt-6 text-center text-sm font-medium min-h-[20px]"></p>

        <div class="mt-8 text-center text-slate-500 text-sm">
            Don't have an account? 
            <a href="register.html" class="text-slate-100 font-bold ml-1">Sign Up</a>
        </div>
    </main>
    <footer></footer>
    <script type="module" src="../assets/js/layout.js"></script>
    <script type="module" src="../assets/js/auth.js"></script>
</body>
</html>
