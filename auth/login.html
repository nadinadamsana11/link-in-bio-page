<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Link-in-Bio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/theme.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[var(--bg-page)] text-[var(--text-main)] min-h-screen flex flex-col">
    <div class="bg-dot-matrix"></div>
    <main class="flex-grow flex items-center justify-center p-6 bg-[var(--bg-page)] relative overflow-hidden">
        <div id="auth-card" class="bg-[var(--bg-card)] p-8 md:p-12 rounded-[2.5rem] w-full max-w-md shadow-2xl border border-[var(--border-subtle)] relative z-10 transition-all text-[var(--text-on-light)]">
            <!-- Final Step: Production Card -->
            <div id="login-card" class="bg-[var(--bg-card)] border border-[var(--border-subtle)] rounded-[3rem] p-10 md:p-14 shadow-2xl relative overflow-hidden animate-slide-up text-[var(--text-on-light)]">
                <div class="absolute top-0 right-0 p-8 opacity-5">
                    <i data-lucide="shield-check" class="w-48 h-48 text-[var(--text-on-light)]"></i>
                </div>
            <h1 class="text-3xl font-black tracking-tight text-[var(--text-main)]">Welcome back</h1>
            <p class="text-[var(--text-muted)] mt-2">Sign in to manage your page</p>
        

        <form id="loginForm" class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-black text-[var(--text-on-light)]/60 uppercase tracking-[0.2em] mb-3 ml-1">Official Email</label>
                            <input type="email" id="email" required
                                class="w-full bg-[var(--bg-page)]/5 border border-[var(--border-subtle)] rounded-2xl py-5 px-6 focus:ring-1 focus:ring-[var(--c-primary)] outline-none transition-all font-bold text-[var(--text-on-light)]"
                                placeholder="name@domain.com">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-[var(--text-on-light)]/60 uppercase tracking-[0.2em] mb-3 ml-1">Access Key</label>
                            <div class="relative">
                            <input type="password" id="password" required
                                class="w-full bg-[var(--bg-page)]/5 border border-[var(--border-subtle)] rounded-2xl py-5 px-6 focus:ring-1 focus:ring-[var(--c-primary)] outline-none transition-all font-bold text-[var(--text-on-light)]"
                                placeholder="••••••••">
                            <button type="button" class="password-toggle absolute right-4 top-1/2 -translate-y-1/2 text-[var(--text-dim)] hover:text-[var(--text-main)] transition-colors">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
            <button type="submit" 
                class="w-full creative-btn-primary py-4 rounded-2xl transition-all flex items-center justify-center gap-2 group mt-2">
                Sign In
                <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
            </button>
            <button type="button" id="magicLinkBtn" class="w-full text-[var(--c-primary)] hover:text-[var(--c-secondary)] text-sm font-bold py-1 transition-all">
                Send Login Link instead
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-[var(--border-subtle)]"></span></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-[var(--bg-card)] px-4 text-[var(--text-muted)] font-black tracking-widest">Or continue with</span></div>
        </div>

        <button id="googleLogin" 
            class="w-full bg-[var(--bg-page)] hover:bg-[var(--bg-card-hover)] text-[var(--text-main)] font-black py-4 rounded-2xl border border-[var(--border-subtle)] transition-all flex items-center justify-center gap-3">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
        </button>

        <p id="message" class="mt-6 text-center text-sm font-medium min-h-[20px]"></p>

        <div class="mt-8 text-center text-[var(--text-muted)] text-sm">
            Don't have an account? 
            <a href="register.html" class="text-[var(--text-main)] font-bold ml-1">Sign Up</a>
        </div>
    </main>
    <footer></footer>
    <script type="module" src="../assets/js/layout.js"></script>
    <script type="module" src="../assets/js/auth.js"></script>
</body>
</html>
