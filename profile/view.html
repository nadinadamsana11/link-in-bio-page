<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Link-in-Bio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-6">
    
    <div id="profileContent" class="w-full max-w-lg hidden">
        <!-- Header -->
        <div class="text-center mb-8">
            <div id="profilePhoto" class="w-24 h-24 md:w-32 md:h-32 rounded-full bg-slate-800 border-4 border-slate-700 mx-auto overflow-hidden mb-4 shadow-2xl">
                <!-- Image injected here -->
            </div>
            <h1 id="profileName" class="text-2xl md:text-3xl font-extrabold tracking-tight"></h1>
            <p id="profileBio" class="text-slate-400 mt-2 text-sm md:text-base px-4"></p>
        </div>

        <!-- Links Container -->
        <div id="profileLinks" class="space-y-4">
            <!-- Links injected here -->
        </div>

        <!-- Footer -->
        <div class="mt-12 text-center">
            <a href="../index.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-full glass border border-slate-700 text-xs text-slate-400 hover:text-white">
                <i data-lucide="zap" class="w-3 h-3 text-slate-500"></i>
                Create your own Link-in-Bio
            </a>
        </div>
    </div>

    <!-- Skeleton/Loading State -->
    <div id="loading" class="text-center space-y-4">
        <div class="w-24 h-24 rounded-full bg-slate-800 mx-auto"></div>
        <div class="h-6 w-48 bg-slate-800 mx-auto rounded"></div>
        <div class="h-4 w-64 bg-slate-800 mx-auto rounded"></div>
    </div>

    <!-- Error State -->
    <div id="errorState" class="hidden text-center glass-dark p-8 rounded-2xl border border-slate-800">
        <i data-lucide="alert-circle" class="w-12 h-12 text-red-400 mx-auto mb-4"></i>
        <h2 class="text-xl font-bold">Profile Not Found</h2>
        <p class="text-slate-400 mt-2">The user you're looking for doesn't exist.</p>
        <a href="../index.html" class="mt-6 inline-block text-slate-400 hover:underline">Go Home</a>
    </div>

    <script type="module" src="../assets/js/profile.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
