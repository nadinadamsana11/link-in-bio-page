<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Profile | Link-in-Bio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <main class="max-w-4xl mx-auto px-6 py-20 animate-slide-up">
        <!-- Expanded Identity Badge (Mirror Dash) -->
        <div id="identityBadge" class="bg-slate-900 border border-slate-800 rounded-[3rem] p-8 md:p-14 mb-16 shadow-2xl relative overflow-hidden border-glow">
            <div class="absolute top-0 right-0 p-8 opacity-10">
                <i data-lucide="id-card" class="w-48 h-48"></i>
            </div>

            <div class="relative z-10 flex flex-col md:flex-row gap-8 md:gap-14">
                <div class="relative mx-auto md:mx-0">
                    <div id="avatarPreview" class="w-48 h-48 md:w-64 md:h-64 rounded-[3.5rem] bg-slate-800 border-8 border-slate-800/50 overflow-hidden shadow-2xl">
                        <!-- Image injected via JS -->
                    </div>
                    <div class="absolute -bottom-3 inset-x-0 flex justify-center">
                        <div class="bg-emerald-500 text-slate-950 px-6 py-2 rounded-full text-[10px] font-black tracking-widest uppercase shadow-2xl ring-4 ring-slate-900">
                            Verified Creator
                        </div>
                    </div>
                </div>

                <div class="flex-1 space-y-8">
                    <div class="text-center md:text-left">
                        <div class="flex flex-col md:flex-row md:items-center gap-4">
                            <h1 id="badgeName" class="text-5xl md:text-6xl font-black tracking-tighter text-white">Loading...</h1>
                            <span id="badgeUsername" class="bg-slate-800 text-slate-400 px-5 py-2 rounded-2xl text-sm font-mono tracking-tighter border border-slate-700">@username</span>
                        </div>
                        <p class="text-[10px] text-slate-500 font-black tracking-[0.4em] uppercase mt-3">Public Identity Document</p>
                    </div>
                    
                    <div class="bg-slate-950/40 border border-slate-800/50 p-8 rounded-[2.5rem] backdrop-blur-sm shadow-inner">
                        <p id="badgeBio" class="text-slate-400 text-xl leading-relaxed italic"></p>
                    </div>

                    <!-- Expanded Data Grid -->
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-y-8 gap-x-4 pt-6 border-t border-slate-800/50">
                        <div class="space-y-1">
                            <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Date of Birth</p>
                            <p id="badgeDOB" class="text-xs font-bold text-slate-300">N/A</p>
                        </div>
                        <div class="space-y-1">
                            <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Age</p>
                            <p id="badgeAge" class="text-xs font-bold text-slate-300">N/A</p>
                        </div>
                        <div class="space-y-1">
                            <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Gender</p>
                            <p id="badgeGender" class="text-xs font-bold text-slate-300">N/A</p>
                        </div>
                        <div class="space-y-1">
                            <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Hometown</p>
                            <p id="badgeHome" class="text-xs font-bold text-slate-300 truncate">N/A</p>
                        </div>
                        <div class="space-y-1">
                            <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Telephone</p>
                            <p id="badgeTel" class="text-xs font-bold text-slate-300">N/A</p>
                        </div>
                        <div class="space-y-1">
                            <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Official Email</p>
                            <p id="badgeEmail" class="text-xs font-bold text-slate-300 truncate">N/A</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Links Library -->
        <div id="linksList" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Injected via JS -->
        </div>

        <footer class="mt-20 text-center">
            <a href="../index.html" class="inline-flex items-center gap-3 bg-slate-900 px-8 py-4 rounded-full border border-slate-800 hover:bg-slate-800 transition-all text-slate-500 hover:text-white border-glow">
                <i data-lucide="zap" class="w-4 h-4 text-emerald-400"></i>
                <span class="text-[10px] font-black uppercase tracking-[0.2em]">Build your own Identity Card</span>
            </a>
        </footer>
    </main>

    <script type="module" src="../assets/js/profile.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
