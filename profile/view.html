<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Profile | Digital Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-[var(--bg-page)] text-[var(--text-main)] min-h-screen flex flex-col">
    <!-- Nav (Synced Header) -->
    <nav class="border-b border-[var(--border-subtle)] bg-[var(--bg-page)]/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-[var(--bg-card)] p-2 rounded-xl border border-[var(--border-subtle)]">
                    <i data-lucide="zap" class="w-5 h-5 text-[var(--text-on-light)]"></i>
                </div>
                <a href="../index.html" class="font-bold text-xl tracking-tight leading-none hover:text-[var(--text-main)]/70 transition-colors text-[var(--text-main)]">Digital Profile</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="../auth/register.html" class="bg-[var(--btn-primary-bg)] text-[var(--btn-primary-text)] px-8 py-3 rounded-full text-[10px] font-black uppercase tracking-widest hover:scale-105 transition-all shadow-xl">Build your own Identity Card</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto px-6 py-20 animate-slide-up">
        <!-- Expanded Identity Badge (Mirror Dash) -->
        <div id="identityBadge" class="bg-[var(--bg-card)] border border-[var(--border-subtle)] rounded-[3rem] p-8 md:p-14 mb-16 shadow-2xl relative overflow-hidden border-glow text-[var(--text-on-light)]">
            <div class="absolute top-0 right-0 p-8 opacity-10">
                <i data-lucide="id-card" class="w-48 h-48 text-[var(--c-primary)]"></i>
            </div>

            <div class="relative z-10 flex flex-col md:flex-row gap-8 md:gap-14">
                <div class="relative mx-auto md:mx-0">
                    <div id="avatarPreview" class="w-48 h-48 md:w-64 md:h-64 rounded-[3.5rem] bg-[var(--bg-card-hover)] border-8 border-[var(--border-subtle)] overflow-hidden shadow-2xl">
                        <!-- Image injected via JS -->
                    </div>
                    <div class="absolute -bottom-3 inset-x-0 flex justify-center">
                        <div class="bg-[var(--c-primary)] text-[var(--c-bg)] px-6 py-2 rounded-full text-[10px] font-black tracking-widest uppercase shadow-2xl ring-4 ring-[var(--bg-page)]">
                            Verified Creator
                        </div>
                    </div>
                </div>

                <div class="flex-1 space-y-8">
                    <div class="text-center md:text-left">
                        <div class="flex flex-col md:flex-row md:items-center gap-4">
                            <h1 id="badgeName" class="text-5xl md:text-6xl font-black tracking-tighter text-[var(--text-on-light)]">Loading...</h1>
                            <span id="badgeUsername" class="bg-[var(--bg-card-hover)] text-[var(--text-on-light)] px-5 py-2 rounded-2xl text-sm font-mono tracking-tighter border border-[var(--border-subtle)]">@username</span>
                        </div>
                        <p class="text-[10px] text-[var(--text-on-light)]/60 font-black tracking-[0.4em] uppercase mt-3">Public Identity Document</p>
                    </div>
                    
                    <div class="bg-[var(--bg-page)]/10 border border-[var(--border-subtle)] p-8 rounded-[2.5rem] backdrop-blur-sm shadow-inner text-[var(--text-on-light)]">
                        <p id="badgeBio" class="text-[var(--text-on-light)]/80 text-xl leading-relaxed italic"></p>
                    </div>

                    <!-- Expanded Data Grid -->
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-y-8 gap-x-4 pt-6 border-t border-[var(--border-subtle)]">
                        <div class="space-y-1">
                            <p class="text-[10px] font-black text-[var(--c-secondary)] uppercase tracking-widest">Date of Birth</p>
                            <p id="badgeDOB" class="text-xs font-bold text-[var(--text-on-light)]">N/A</p>
                        </div>
                        <div class="space-y-1">
                            <p class="text-[10px] font-black text-[var(--c-secondary)] uppercase tracking-widest">Age</p>
                            <p id="badgeAge" class="text-xs font-bold text-[var(--text-on-light)]">N/A</p>
                        </div>
                        <div class="space-y-1">
                            <p class="text-[10px] font-black text-[var(--c-secondary)] uppercase tracking-widest">Gender</p>
                            <p id="badgeGender" class="text-xs font-bold text-[var(--text-on-light)]">N/A</p>
                        </div>
                        <div class="space-y-1">
                            <p class="text-[10px] font-black text-[var(--c-secondary)] uppercase tracking-widest">Hometown</p>
                            <p id="badgeHome" class="text-xs font-bold text-[var(--text-on-light)] truncate">N/A</p>
                        </div>
                        <div class="space-y-1">
                            <p class="text-[10px] font-black text-[var(--c-secondary)] uppercase tracking-widest">Telephone</p>
                            <p id="badgeTel" class="text-xs font-bold text-[var(--text-on-light)]">N/A</p>
                        </div>
                        <div class="space-y-1">
                            <p class="text-[10px] font-black text-[var(--c-secondary)] uppercase tracking-widest">Official Email</p>
                            <p id="badgeEmail" class="text-xs font-bold text-[var(--text-on-light)] truncate">N/A</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Links Library -->
        <div id="linksList" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Injected via JS -->
        </div>

        <footer class="mt-20 text-center">
            <a href="../index.html" class="inline-flex items-center gap-3 bg-[var(--bg-card)] px-8 py-4 rounded-full border border-[var(--border-subtle)] hover:bg-[var(--bg-card-hover)] transition-all text-[var(--text-on-light)] hover:text-[var(--text-on-light)] border-glow">
                <i data-lucide="zap" class="w-4 h-4 text-[var(--c-primary)]"></i>
                <span class="text-[10px] font-black uppercase tracking-[0.2em]">Build your own Identity Card</span>
            </a>
        </footer>
    </main>

    <footer></footer>

    <script type="module" src="../assets/js/layout.js"></script>
    <script type="module" src="../assets/js/profile.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
