<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link-in-Bio | Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen selection:bg-white selection:text-slate-950">
    <!-- Profile Content -->
    <main id="profileContent" class="hidden max-w-2xl mx-auto px-6 py-10 md:py-20 animate-fade-in">
        <!-- Identity Badge (NIC Style) -->
        <div class="bg-slate-900 border border-slate-800 rounded-[3rem] p-10 md:p-14 mb-12 shadow-2xl relative overflow-hidden group">
            <div class="absolute top-0 right-0 p-8 opacity-10">
                <i data-lucide="zap" class="w-32 h-32"></i>
            </div>
            
            <div class="relative z-10 flex flex-col items-center text-center space-y-8">
                <!-- Avatar -->
                <div class="relative">
                    <div id="profilePhoto" class="w-44 h-44 md:w-56 md:h-56 rounded-[3rem] bg-slate-800 border-8 border-slate-800/50 overflow-hidden shadow-2xl">
                        <!-- Image injected via JS -->
                    </div>
                    <div class="absolute -bottom-2 right-6 bg-emerald-500 text-slate-950 px-5 py-2 rounded-full text-[10px] font-black tracking-widest uppercase shadow-2xl ring-4 ring-slate-900">
                        Official ID
                    </div>
                </div>

                <!-- Info -->
                <div class="space-y-6 w-full">
                    <div class="space-y-2">
                        <h1 id="profileName" class="text-5xl md:text-6xl font-black tracking-tighter leading-tight text-white">Loading...</h1>
                        <p id="profileUsername" class="text-slate-500 font-mono text-xl font-bold tracking-tighter">@username</p>
                    </div>
                    
                    <div class="bg-slate-950/50 border border-slate-800/50 p-8 rounded-[2.5rem] backdrop-blur-sm">
                        <p id="profileBio" class="text-slate-400 text-xl leading-relaxed italic">
                            No bio added yet.
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Links Grid (Single Column Cards) -->
        <div id="profileLinks" class="grid grid-cols-1 gap-6">
            <!-- Link Cards injected via JS -->
        </div>

        <!-- Branding -->
        <div class="mt-24 text-center pb-12">
            <a href="../index.html" class="inline-flex items-center gap-3 bg-slate-900 border border-slate-800 px-8 py-4 rounded-3xl hover:bg-slate-800 transition-all group shadow-xl hover:shadow-white/5">
                <i data-lucide="zap" class="w-6 h-6 text-white group-hover:scale-110 transition-transform"></i>
                <span class="text-slate-400 font-black text-xs uppercase tracking-widest group-hover:text-white">Create your own Link-in-Bio</span>
            </a>
        </div>
    </main>

    <!-- Loading State -->
    <div id="loading" class="fixed inset-0 flex items-center justify-center bg-slate-950 z-[100]">
        <div class="flex flex-col items-center gap-8">
            <div class="w-20 h-20 border-4 border-slate-800 border-t-white rounded-full animate-spin"></div>
            <p class="text-slate-600 font-black uppercase tracking-[0.4em] text-[10px]">Verifying Identity...</p>
        </div>
    </div>

    <!-- Error State -->
    <div id="errorState" class="hidden fixed inset-0 flex items-center justify-center bg-slate-950">
        <div class="text-center space-y-8 px-6">
            <div class="bg-red-500/10 w-24 h-24 rounded-full flex items-center justify-center mx-auto border border-red-500/20">
                <i data-lucide="user-x" class="w-12 h-12 text-red-500"></i>
            </div>
            <h2 class="text-4xl font-black text-white tracking-tighter">Identity Not Found</h2>
            <p class="text-slate-500 max-w-sm mx-auto text-lg">This profile has been moved or doesn't exist. Check the handle and try again.</p>
            <a href="../index.html" class="inline-block bg-white text-slate-950 px-10 py-5 rounded-3xl font-black uppercase tracking-widest text-xs shadow-2xl">Return Home</a>
        </div>
    </div>

    <script type="module" src="../assets/js/profile.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
